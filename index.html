<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ElectricalPH</title>
    <script>
      // Automatically silence and handle Vite's benign WebSocket connection errors in the sandbox environment
      (function() {
        var OriginalWebSocket = window.WebSocket;
        if (!OriginalWebSocket) return;
        
        var isDevEnv = window.location.hostname.includes('run.app') || 
                       window.location.hostname.includes('localhost') || 
                       window.location.hostname.includes('127.0.0.1');
                       
        if (isDevEnv) {
          window.WebSocket = function(url, protocols) {
            // Intercept Vite development server and HMR WebSocket connections
            if (typeof url === 'string' && (url.includes('/vite') || url.includes('ws://') || url.includes('wss://') || url.includes('/ws'))) {
              console.log('[System] Silenced benign development HMR WebSocket connection: ' + url);
              var listeners = {};
              var socket = {
                url: url,
                readyState: 1, // OPEN - keeps the client from trying to reconnect or throwing errors
                bufferedAmount: 0,
                extensions: '',
                protocol: '',
                binaryType: 'blob',
                onopen: null,
                onerror: null,
                onclose: null,
                onmessage: null,
                
                addEventListener: function(event, callback) {
                  if (!listeners[event]) listeners[event] = [];
                  listeners[event].push(callback);
                },
                
                removeEventListener: function(event, callback) {
                  if (!listeners[event]) return;
                  listeners[event] = listeners[event].filter(function(cb) { return cb !== callback; });
                },
                
                dispatchEvent: function(eventObj) {
                  var event = eventObj.type;
                  if (listeners[event]) {
                    listeners[event].forEach(function(cb) {
                      try { cb(eventObj); } catch (e) {}
                    });
                  }
                  var onevent = 'on' + event;
                  if (typeof this[onevent] === 'function') {
                    try { this[onevent](eventObj); } catch (e) {}
                  }
                  return true;
                },
                
                send: function(data) {},
                close: function() {
                  this.readyState = 3; // CLOSED
                }
              };
              
              // Simulate open event immediately so the client thinks it's connected
              setTimeout(function() {
                var openEvent = { type: 'open', target: socket, currentTarget: socket, srcElement: socket, bubbles: false, cancelable: false, timeStamp: Date.now() };
                socket.dispatchEvent(openEvent);
              }, 50);
              
              return socket;
            }
            return new OriginalWebSocket(url, protocols);
          };
          
          // Copy static properties & prototype to retain full compatibility
          for (var key in OriginalWebSocket) {
            if (OriginalWebSocket.hasOwnProperty(key)) {
              window.WebSocket[key] = OriginalWebSocket[key];
            }
          }
          window.WebSocket.prototype = OriginalWebSocket.prototype;
        }
      })();
    </script>

  <body>
    <div id="error-log" style="display: none; color: red; position: fixed; top: 0; left: 0; z-index: 9999; background: white; padding: 10px; border: 1px solid red; font-family: monospace;"></div>
    <script>
      window.addEventListener('error', function(e) {
        var log = document.getElementById('error-log');
        log.style.display = 'block';
        log.innerText += e.message + '\n' + e.filename + ':' + e.lineno + '\n';
      });
      window.addEventListener('unhandledrejection', function(e) {
        var log = document.getElementById('error-log');
        log.style.display = 'block';
        log.innerText += 'Promise rejection: ' + e.reason + '\n';
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
