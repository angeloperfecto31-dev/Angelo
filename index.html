<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ElectricalPH</title>
    <!-- Favicon configuration for modern browsers, high-fidelity crisp vector SVG logo -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon.svg" />
    <link rel="mask-icon" href="/favicon.svg" color="#FACC15" />
    <meta name="theme-color" content="#FACC15" />
  </head>
  <body>
    <div id="error-log" style="color: red; position: fixed; top: 0; left: 0; z-index: 9999; background: white; padding: 10px; font-family: monospace;"></div>
    <script>
      window.addEventListener('error', function(e) {
        document.getElementById('error-log').innerText += e.message + '\n' + e.filename + ':' + e.lineno + '\n';
      });
      window.addEventListener('unhandledrejection', function(e) {
        document.getElementById('error-log').innerText += 'Promise rejection: ' + e.reason + '\n';
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
